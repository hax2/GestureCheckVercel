<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gesture Rating Task</title>
    <link rel="stylesheet" href="gesture-rating-task.css">
  </head>
  <body>
    <main class="survey-app">
      <header class="topbar">
        <div>
          <p id="appTitle" class="eyebrow">Gesture Rating Task</p>
          <h1 id="targetWord">Loading videos...</h1>
          <p id="videoTitle" class="muted"></p>
        </div>
        <div class="session-controls">
          <label>
            <span>Language</span>
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="de">Deutsch</option>
              <option value="it">Italiano</option>
            </select>
          </label>
          <label>
            <span>Participant ID</span>
            <input id="participantId" autocomplete="off" placeholder="Optional">
          </label>
        </div>
      </header>

      <section class="instructions-panel" aria-labelledby="instructionsTitle">
        <div>
          <p id="instructionsKicker" class="eyebrow">Instructions</p>
          <h2 id="instructionsTitle">Gesture Rating Task Instructions</h2>
          <div id="instructionsBody" class="instructions-body"></div>
        </div>
        <table class="scale-table" aria-label="Rating scale">
          <thead>
            <tr>
              <th id="scaleRatingHead" scope="col">Rating</th>
              <th id="scaleMeaningHead" scope="col">Meaning</th>
            </tr>
          </thead>
          <tbody id="scaleRows"></tbody>
        </table>
      </section>

      <section id="consentPanel" class="consent-panel" aria-labelledby="consentTitle">
        <form id="consentForm" class="consent-form">
          <div>
            <p id="consentKicker" class="eyebrow">Informed consent</p>
            <h2 id="consentTitle">Participant consent</h2>
          </div>
          <div id="consentBody" class="consent-body"></div>
          <div id="consentChecks" class="consent-checks"></div>
          <div class="actions">
            <p id="consentStatus" class="muted"></p>
            <button id="consentButton" class="primary-button" type="submit">Continue</button>
          </div>
        </form>
      </section>

      <section id="demographicsPanel" class="demographics-panel" aria-labelledby="demographicsTitle">
        <form id="demographicsForm" class="demographics-form">
          <div>
            <p id="demographicsKicker" class="eyebrow">Before you start</p>
            <h2 id="demographicsTitle">Participant information</h2>
          </div>
          <div class="demographics-grid">
            <label>
              <span id="ageLabel">Age</span>
              <input id="ageInput" type="number" min="18" max="120" inputmode="numeric" required>
            </label>
            <label>
              <span id="genderLabel">Gender</span>
              <select id="genderInput" required>
                <option value=""></option>
                <option value="woman">Woman</option>
                <option value="man">Man</option>
                <option value="non_binary">Non-binary</option>
                <option value="prefer_not_to_say">Prefer not to say</option>
                <option value="self_describe">Self-describe</option>
              </select>
            </label>
            <label>
              <span id="nativeLanguageLabel">Native language</span>
              <input id="nativeLanguageInput" autocomplete="language" required>
            </label>
            <label>
              <span id="educationLabel">Highest level of education</span>
              <select id="educationInput" required>
                <option value=""></option>
                <option value="secondary">Secondary school</option>
                <option value="vocational">Vocational training</option>
                <option value="bachelor">Bachelor's degree</option>
                <option value="master">Master's degree</option>
                <option value="doctorate">Doctorate</option>
                <option value="other">Other</option>
              </select>
            </label>
            <label>
              <span id="handednessLabel">Handedness</span>
              <select id="handednessInput" required>
                <option value=""></option>
                <option value="right">Right-handed</option>
                <option value="left">Left-handed</option>
                <option value="both">Both / ambidextrous</option>
              </select>
            </label>
            <label>
              <span id="familiarityLabel">Familiarity with European gesture cultures</span>
              <select id="familiarityInput" required>
                <option value=""></option>
                <option value="none">Not familiar</option>
                <option value="low">Slightly familiar</option>
                <option value="moderate">Moderately familiar</option>
                <option value="high">Very familiar</option>
              </select>
            </label>
          </div>
          <div class="actions">
            <p id="demographicsStatus" class="muted"></p>
            <button id="startButton" class="primary-button" type="submit">Start</button>
          </div>
        </form>
      </section>

      <div id="workbench" class="workbench hidden">
        <section class="stimulus-panel" aria-label="Current video">
          <video id="videoPlayer" controls playsinline preload="metadata"></video>
          <p id="stimulusWord" class="stimulus-word"></p>
          <div class="progress-box">
            <p id="progressText" class="eyebrow"></p>
            <div class="progress-track" aria-label="Survey progress">
              <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="blockSummary" class="muted"></p>
            <p id="saveStatus" class="muted">Choose one score for each row.</p>
          </div>
        </section>

        <form id="ratingForm" class="rating-form">
          <section class="rating-matrix-wrap" aria-label="Rating dimensions">
            <table class="rating-matrix">
              <thead>
                <tr>
                  <th id="dimensionHead" scope="col" class="dimension-head">Question</th>
                  <th scope="col"><span class="score">1</span><span class="score-label" data-label="1">Not at all</span></th>
                  <th scope="col"><span class="score">2</span><span class="score-label" data-label="2">A little / Slightly</span></th>
                  <th scope="col"><span class="score">3</span><span class="score-label" data-label="3">Moderately / Somewhat</span></th>
                  <th scope="col"><span class="score">4</span><span class="score-label" data-label="4">Very</span></th>
                  <th scope="col"><span class="score">5</span><span class="score-label" data-label="5">Extremely</span></th>
                </tr>
              </thead>
              <tbody id="ratingRows"></tbody>
            </table>
          </section>

          <label class="notes-field">
            <span id="notesLabel">Notes, optional</span>
            <textarea id="notes" rows="2" placeholder="Anything unclear about this gesture?"></textarea>
          </label>

          <div class="actions">
            <button id="backButton" type="button">Back</button>
            <button id="nextButton" class="primary-button" type="submit">Save and continue</button>
          </div>
        </form>
      </div>
    </main>

    <script src="gesture-rating-task.js"></script>
  </body>
</html>
